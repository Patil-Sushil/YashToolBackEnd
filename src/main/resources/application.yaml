server:
  port: 8080

spring:
  application:
    name: FoundryApplication

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:9090/YashTool?useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1422}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    repair-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
        starttls:
          enable: true

jwt:
  secret: ${JWT_SECRET:Q0tQeXJmOW9Jb2ZxV2F5cFhUeG5sQzFkQkZpQzZ3c0ZxS0p4cA==}
  expiration: 604800000
  refresh-expiration: 604800000

app:
  company-state: ${COMPANY_STATE:Maharashtra}
  default-admin:
    email: admin@foundry.com
    password: Admin@123

logging:
  level:
    org.flywaydb: INFO
    org.springframework.security: INFO
    com.example.YashToolBackEnd: INFO
